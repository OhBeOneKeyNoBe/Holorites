# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for the Holorites repo.
# Docs: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # File-class-specific instructions so the bot knows the architecture.
  path_instructions:
    - path: "moe_*.py"
      instructions: |
        These files implement the streamer-driven MoE inference pipeline.
        moe_streamer.py: per-expert byte slicing, three-stream cache,
        anticipatory prefetch. moe_kernels.py: GPU-side Q4_K / Q6_K /
        Q8_0 / Q3_K / Q2_K / MXFP4 dequant. moe_forward.py: Qwen3-MoE
        GQA + RoPE + KV cache + grouped GEMM. moe_chat.py: tokenizer +
        sampler.
        Be especially watchful for: shape mismatches on GGUF reverse-
        axis-order tensors; CUDA stream synchronization gaps; Q4_K
        block alignment in per-expert slicing; KV cache concatenation
        bugs across tokens; off-by-one in the bit-slice arithmetic.

    - path: "torus_lattice.py"
      instructions: |
        The 64^3-per-shell Matryoshka geometric substrate. Verify:
        bit-slice round-trips (token <-> address) preserve identity;
        modular arithmetic on every torus axis (no clamping);
        SPIRAL_Q = 1 coprimality with 64; helical Stream walks stay
        inside the active envelope.

    - path: "vertical_axis.py"
      instructions: |
        Trajectory rays + cos theta alignment + ZeGoDie 12^7 embedding.
        Watch for: cos_alignment returning +/-1 exactly for cardinal
        rays (cardinal up = (0,0,0), down = (32,32,32) at each shell);
        ZeGoDie <-> ray round-trip exactness across the 12-face-to-
        64-slot quantization boundary.

    - path: "gguf_holoritify.py"
      instructions: |
        GGUF parser + embedding torus builder. Verify: dequant decoders
        for F32 / F16 / BF16 / Q8_0 / Q4_K / Q6_K / Q4_0 produce byte-
        equal results vs llama.cpp reference; vocab overflow into
        shell 1 is correctly recorded in the manifest.

    - path: "**/*.sh"
      instructions: |
        Download orchestrators. Curl invocations must always include
        `--continue-at -` for resume-safety and `--retry` for transient
        HF rate-limit recovery.

# Short tone hint (CodeRabbit caps this at 250 chars).
tone_instructions: |
  Be direct and technically precise. Prioritize correctness
  (shape, dtype, stride, CUDA sync, off-by-one, numerical
  stability) over style nitpicks.

chat:
  auto_reply: true
